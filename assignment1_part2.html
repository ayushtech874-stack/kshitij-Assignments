<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* BONUS: smooth scroll */
    html {
      scroll-behavior: smooth;
    }

    :root {
      --bg-color: #0f0f13;
      --text-color: #e8e8f0;
      --accent-color: #7c6af5;
      --muted-color: #8888a0;

      --font-heading: 'Georgia', serif;
      --font-body: 'Segoe UI', sans-serif;
    }

    body {
      background-color: honeydew;
      color: black;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1rem;
    }

    /* ===== NAVBAR ===== */

    /* b. fixed at top so it stays while scrolling */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      background-color: #0f0f13;
      border-bottom: 1px solid #2a2a3a;
    }

    /* a. flexbox to put logo on left, links on right */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      color: var(--accent-color);
      text-decoration: none;
    }

    nav ul {
      display: flex;
      gap: 0.5rem;
      list-style: none;
    }

    nav ul a {
      color: var(--muted-color);
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;

      /* BONUS: smooth hover transition */
      transition: color 0.2s, background-color 0.2s;
    }

    /* BONUS: hover effect */
    nav ul a:hover {
      color: var(--text-color);
      background-color: rgba(124, 106, 245, 0.15);
    }

    /* push page content down so it doesn't hide under the navbar */
    main {
      padding-top: 60px;
    }

    /* just so sections have some height to scroll between */
    section {
      min-height: 100vh;
      padding: 4rem 2rem;
    }

  </style>
</head>
<body>

  <header>
    <nav>

      <!-- logo / name on the LEFT -->
      <a href="#hero" class="logo">Ayush Kumar</a>

      <!-- links on the RIGHT -->
      <ul>
        <li><a href="#hero">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

    </nav>
  </header>

  <main>
    <section id="hero">
      <!-- hero section will go here -->
    </section>

    <section id="projects">
      <!-- projects will go here -->
    </section>

    <section id="contact">
      <!-- contact form will go here -->
    </section>
  </main>

  <footer>

  </footer>

</body>
</html>
