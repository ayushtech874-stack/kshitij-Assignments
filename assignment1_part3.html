<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: honeydew;
      color: black;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1rem;
    }

    /* ===== NAVBAR ===== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      background-color: #0f0f13;
      border-bottom: 1px solid #2a2a3a;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
    }

    .logo {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.2rem;
      color: #7c6af5;
      text-decoration: none;
    }

    nav ul {
      display: flex;
      gap: 0.5rem;
      list-style: none;
    }

    nav ul a {
      color: #8888a0;
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: color 0.2s, background-color 0.2s;
    }

    nav ul a:hover {
      color: #e8e8f0;
      background-color: rgba(124, 106, 245, 0.15);
    }

    main {
      padding-top: 60px;
    }

    section {
      min-height: 100vh;
      padding: 4rem 2rem;
    }

    /* ===== HERO SECTION ===== */

    #hero {
      /* b. center everything vertically and horizontally */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      background-color: #f0fff0;
    }

    /* wrapper just to group the three lines together */
    .hero-content {
      max-width: 650px;
    }

    /* a. greeting line */
    .hero-greeting {
      font-size: 1.1rem;
      font-weight: 400;
      color: #555555;
      margin-bottom: 12px;

      /* b. typography control */
      line-height: 1.5;
    }

    /* a. your name — the big heading */
    .hero-name {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 16px;

      /* BONUS: gradient text */
      background: linear-gradient(to right, #7c6af5, #c084fc, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* a. subtitle / role */
    .hero-role {
      font-size: 1.2rem;
      font-weight: 400;
      color: #666666;
      line-height: 1.7;
    }

  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#hero" class="logo">Ayush Kumar</a>
      <ul>
        <li><a href="#hero">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ===== HERO ===== -->
    <section id="hero">
      <div class="hero-content">

        <!-- a. greeting -->
        <p class="hero-greeting">Hello, my name is</p>

        <!-- a. name + BONUS gradient -->
        <h1 class="hero-name">Ayush Kumar</h1>

        <!-- a. role subtitle -->
        <p class="hero-role">Web Developer</p>

      </div>
    </section>

    <section id="projects">
      <!-- projects will go here -->
    </section>

    <section id="contact">
      <!-- contact form will go here -->
    </section>

  </main>

  <footer>

  </footer>

</body>
</html>
