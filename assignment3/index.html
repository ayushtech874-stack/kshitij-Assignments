<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streak — Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --paper:        #faf6f0;
      --paper-raised: #ffffff;
      --ink:          #2b2420;
      --ink-soft:     #6b6058;
      --line:         #e8ddd0;
      --ember:        #c2541f;
      --ember-soft:   #f0d9c8;
      --ember-bg:     #fdf1e7;
      --moss:         #4a7c59;
      --ice:          #5b9bd5;
      --ice-bg:       #e8f2fb;
      --shadow-sm:    0 1px 3px rgba(43,36,32,.07);
      --shadow-md:    0 4px 16px rgba(43,36,32,.09);
      --shadow-lg:    0 12px 32px rgba(43,36,32,.15);
      --font-display: 'Fraunces', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
      --r-sm: 8px; --r-md: 14px; --r-lg: 20px;
    }
    [data-theme="dark"] {
      --paper:        #1c1815;
      --paper-raised: #262019;
      --ink:          #f0e8de;
      --ink-soft:     #a89c8e;
      --line:         #3a3128;
      --ember:        #e07840;
      --ember-soft:   #4a2f1c;
      --ember-bg:     #2e2118;
      --moss:         #7bb88d;
      --ice:          #7ab3e0;
      --ice-bg:       #1a2d3f;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.3);
      --shadow-md:    0 4px 16px rgba(0,0,0,.4);
      --shadow-lg:    0 12px 32px rgba(0,0,0,.5);
    }

    /* ── Reset & base ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      transition: background .25s, color .25s;
    }
    h1,h2,h3,h4 { font-family: var(--font-display); font-weight:600; color:var(--ink); }
    button { font-family: var(--font-body); cursor:pointer; }
    input, select, textarea { font-family: var(--font-body); }
    ::selection { background: var(--ember-soft); }
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-thumb { background:var(--line); border-radius:8px; }

    /* ── Layout ── */
    #app { min-height:100vh; display:flex; flex-direction:column; }

    /* ── Navbar ── */
    .navbar {
      position:sticky; top:0; z-index:50;
      background:var(--paper); border-bottom:1px solid var(--line);
      backdrop-filter:blur(8px);
    }
    .navbar-inner {
      max-width:1080px; margin:0 auto; padding:.9rem 1.5rem;
      display:flex; align-items:center; gap:1.5rem;
    }
    .navbar-brand {
      display:flex; align-items:center; gap:.4rem;
      font-family:var(--font-display); font-size:1.25rem; font-weight:700;
      text-decoration:none; color:var(--ink); cursor:pointer; border:none; background:none;
    }
    .brand-mark {
      width:28px; height:28px; border-radius:8px;
      background:var(--ember); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:.95rem; font-weight:700;
    }
    .nav-links { display:flex; gap:.25rem; flex:1; }
    .nav-btn {
      background:none; border:none; color:var(--ink-soft);
      font-size:.9rem; font-weight:600; padding:.45rem .85rem; border-radius:var(--r-sm);
      transition:background .15s, color .15s;
    }
    .nav-btn:hover { background:var(--ember-bg); color:var(--ink); }
    .nav-btn.active { background:var(--ember); color:#fff; }
    .theme-btn {
      background:var(--paper-raised); border:1px solid var(--line);
      width:36px; height:36px; border-radius:50%;
      font-size:.95rem; display:flex; align-items:center; justify-content:center;
      color:var(--ink); transition:transform .2s, border-color .2s;
    }
    .theme-btn:hover { border-color:var(--ember); transform:rotate(15deg); }

    /* ── Main content ── */
    .main { flex:1; max-width:1080px; margin:0 auto; padding:2rem 1.5rem 4rem; width:100%; }

    /* ── Page transitions ── */
    .page { animation: fadeIn .18s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* ── Dashboard ── */
    .dash-header {
      display:flex; justify-content:space-between; align-items:flex-end;
      gap:1rem; margin-bottom:1.6rem; flex-wrap:wrap;
    }
    .dash-date { font-size:.8rem; color:var(--ink-soft); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:.2rem; }
    .dash-header h1 { font-size:2rem; }
    .btn-primary {
      background:var(--ember); color:#fff; border:none;
      padding:.65rem 1.2rem; border-radius:var(--r-sm);
      font-weight:700; font-size:.88rem; white-space:nowrap;
      transition:filter .15s, transform .15s;
    }
    .btn-primary:hover { filter:brightness(1.08); transform:translateY(-1px); }

    .summary-bar {
      display:flex; gap:2rem; background:var(--paper-raised);
      border:1px solid var(--line); border-radius:var(--r-lg);
      padding:1rem 1.5rem; margin-bottom:1.8rem; box-shadow:var(--shadow-sm);
      flex-wrap:wrap;
    }
    .summary-stat { display:flex; flex-direction:column; gap:.1rem; }
    .s-val { font-family:var(--font-display); font-size:1.55rem; font-weight:700; color:var(--ember); }
    .s-lbl { font-size:.72rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }

    .habit-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1.1rem; }

    /* ── Habit Card ── */
    .habit-card {
      background:var(--paper-raised); border:1px solid var(--line);
      border-radius:var(--r-lg); padding:1.2rem 1.4rem 1.3rem;
      box-shadow:var(--shadow-sm); cursor:pointer;
      transition:box-shadow .2s, transform .2s, border-color .2s;
      position:relative; text-align:left;
      border-left:3px solid var(--card-color, var(--ember));
    }
    .habit-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }

    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; }
    .card-title-row { display:flex; align-items:center; gap:.55rem; min-width:0; }
    .color-dot { width:10px; height:10px; border-radius:50%; background:var(--card-color,var(--ember)); flex-shrink:0; }
    .card-title { font-size:1.05rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-del {
      background:none; border:none; color:var(--ink-soft);
      font-size:1.3rem; line-height:1; width:26px; height:26px;
      border-radius:50%; flex-shrink:0; transition:background .15s, color .15s;
    }
    .card-del:hover { background:var(--ember-bg); color:var(--ember); }

    .card-meta { display:flex; gap:.5rem; align-items:center; margin-top:.4rem; }
    .cat-pill {
      font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
      background:var(--ember-bg); color:var(--ember); padding:.18rem .5rem; border-radius:20px;
    }
    .freq-lbl { font-size:.75rem; color:var(--ink-soft); }

    /* Mini heatmap */
    .mini-heatmap { display:flex; gap:3px; margin:.85rem 0; overflow:hidden; }
    .hm-col { display:flex; flex-direction:column; gap:3px; }
    .hm-cell { width:9px; height:9px; border-radius:2px; }
    .hm-done  { background:var(--card-color,var(--ember)); }
    .hm-frozen{ background:var(--ice); }
    .hm-missed{ background:var(--ember-soft); opacity:.6; }
    .hm-skip  { background:var(--line); opacity:.4; }
    .hm-empty { background:var(--line); opacity:.25; }

    .card-stats {
      display:flex; justify-content:space-between;
      padding:.8rem 0 .7rem; border-top:1px solid var(--line);
    }
    .cs { display:flex; flex-direction:column; align-items:center; gap:.08rem; }
    .cs-val { font-family:var(--font-display); font-size:1.3rem; font-weight:700; }
    .cs-lbl { font-size:.65rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }

    .card-actions { display:flex; gap:.5rem; }
    .btn-checkin {
      flex:1; background:var(--ink); color:var(--paper); border:none;
      padding:.6rem .9rem; border-radius:var(--r-sm);
      font-weight:700; font-size:.83rem; transition:background .15s;
    }
    .btn-checkin.done { background:var(--moss); }
    .btn-checkin:hover { filter:brightness(1.1); }
    .btn-freeze {
      background:var(--paper); border:1px solid var(--line); color:var(--ink-soft);
      padding:.6rem .75rem; border-radius:var(--r-sm);
      font-size:.8rem; font-weight:600; transition:border-color .15s, color .15s;
    }
    .btn-freeze:hover:not(:disabled) { border-color:var(--ice); color:var(--ice); }
    .btn-freeze.frozen { background:var(--ice-bg); border-color:var(--ice); color:var(--ice); }
    .btn-freeze:disabled { opacity:.35; cursor:not-allowed; }
    .not-due-lbl { font-size:.82rem; color:var(--ink-soft); font-style:italic; padding:.6rem 0; }

    /* ── Empty state ── */
    .empty-state {
      display:flex; flex-direction:column; align-items:center; text-align:center;
      padding:4rem 1.5rem; background:var(--paper-raised);
      border:1px dashed var(--line); border-radius:var(--r-lg);
    }
    .empty-emoji { font-size:2.4rem; margin-bottom:.7rem; }
    .empty-state h2 { font-size:1.3rem; margin-bottom:.35rem; }
    .empty-state p { color:var(--ink-soft); margin-bottom:1.3rem; max-width:300px; }

    /* ── Modal ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(20,16,12,.45);
      backdrop-filter:blur(2px); display:flex; align-items:center;
      justify-content:center; z-index:200; padding:1rem;
      animation:fadeIn .15s ease;
    }
    .modal-box {
      background:var(--paper-raised); border-radius:var(--r-lg);
      width:100%; max-width:420px; max-height:90vh; overflow-y:auto;
      box-shadow:var(--shadow-lg); animation:slideUp .2s ease;
    }
    @keyframes slideUp { from{transform:translateY(10px);opacity:0} to{transform:none;opacity:1} }
    .modal-head {
      display:flex; justify-content:space-between; align-items:center;
      padding:1.2rem 1.5rem .4rem;
    }
    .modal-head h2 { font-size:1.3rem; }
    .modal-close {
      background:none; border:none; font-size:1.5rem; line-height:1;
      color:var(--ink-soft); width:30px; height:30px; border-radius:50%;
    }
    .modal-close:hover { background:var(--ember-bg); color:var(--ember); }
    .habit-form { display:flex; flex-direction:column; gap:1rem; padding:.4rem 1.5rem 1.5rem; }
    .f-field { display:flex; flex-direction:column; gap:.35rem; }
    .f-label { font-size:.72rem; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }
    .habit-form input[type=text], .habit-form select {
      border:1px solid var(--line); background:var(--paper); color:var(--ink);
      padding:.6rem .8rem; border-radius:var(--r-sm); font-size:.92rem; outline:none;
      transition:border-color .15s;
    }
    .habit-form input:focus, .habit-form select:focus { border-color:var(--ember); }
    .color-swatches { display:flex; gap:.55rem; flex-wrap:wrap; }
    .color-swatch {
      width:28px; height:28px; border-radius:50%;
      border:2px solid transparent; transition:transform .15s, border-color .15s;
    }
    .color-swatch:hover { transform:scale(1.12); }
    .color-swatch.sel { border-color:var(--ink); transform:scale(1.12); }
    .freq-toggle { display:flex; gap:.5rem; }
    .freq-opt {
      flex:1; padding:.5rem; border-radius:var(--r-sm);
      border:1px solid var(--line); background:var(--paper);
      color:var(--ink-soft); font-size:.82rem; font-weight:600; transition:all .15s;
    }
    .freq-opt.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .day-picker { display:flex; gap:.35rem; }
    .day-btn {
      width:32px; height:32px; border-radius:50%;
      border:1px solid var(--line); background:var(--paper);
      color:var(--ink-soft); font-size:.75rem; font-weight:700; transition:all .15s;
    }
    .day-btn.active { background:var(--ember); border-color:var(--ember); color:#fff; }
    .form-submit {
      margin-top:.3rem; background:var(--ember); color:#fff;
      border:none; padding:.75rem; border-radius:var(--r-sm);
      font-size:.92rem; font-weight:700; transition:filter .15s;
    }
    .form-submit:hover { filter:brightness(1.08); }

    /* ── Detail page ── */
    .back-btn {
      background:none; border:none; font-size:.83rem; font-weight:600;
      color:var(--ink-soft); margin-bottom:1.1rem; display:inline-flex;
      align-items:center; gap:.3rem; transition:color .15s; padding:0;
    }
    .back-btn:hover { color:var(--ember); }
    .detail-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:.55rem; flex-wrap:wrap; gap:.6rem;
    }
    .detail-title { display:flex; align-items:center; gap:.65rem; }
    .detail-title .color-dot { width:15px; height:15px; }
    .detail-title h1 { font-size:1.8rem; }
    .btn-del-sm {
      background:none; border:1px solid var(--line); color:var(--ink-soft);
      font-size:.78rem; font-weight:600; padding:.4rem .85rem;
      border-radius:var(--r-sm); transition:all .15s;
    }
    .btn-del-sm:hover { border-color:var(--ember); color:var(--ember); }
    .detail-meta { display:flex; gap:.55rem; align-items:center; margin-bottom:1.5rem; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:.75rem; margin-bottom:1.4rem; }
    .stat-card {
      background:var(--paper-raised); border:1px solid var(--line);
      border-radius:var(--r-md); padding:.85rem 1rem;
      display:flex; flex-direction:column; gap:.12rem; box-shadow:var(--shadow-sm);
    }
    .stat-card .val { font-family:var(--font-display); font-size:1.55rem; font-weight:700; color:var(--card-color,var(--ember)); }
    .stat-card .lbl { font-size:.68rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }
    .detail-actions { display:flex; gap:.6rem; margin-bottom:1.5rem; max-width:400px; }

    /* ── Calendar Heatmap ── */
    .cal-wrap {
      background:var(--paper-raised); border:1px solid var(--line);
      border-radius:var(--r-lg); padding:1.3rem 1.4rem 1.1rem; box-shadow:var(--shadow-sm);
    }
    .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.9rem; }
    .cal-head h3 { font-size:1.05rem; }
    .cal-nav {
      width:30px; height:30px; border-radius:50%;
      border:1px solid var(--line); background:var(--paper);
      color:var(--ink); font-size:1.1rem; display:flex; align-items:center; justify-content:center;
      transition:border-color .15s;
    }
    .cal-nav:hover:not(:disabled) { border-color:var(--card-color,var(--ember)); }
    .cal-nav:disabled { opacity:.3; cursor:not-allowed; }
    .cal-weekdays {
      display:grid; grid-template-columns:repeat(7,1fr);
      margin-bottom:.35rem;
    }
    .cal-weekdays span { text-align:center; font-size:.68rem; font-weight:700; color:var(--ink-soft); text-transform:uppercase; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-cell {
      aspect-ratio:1; border:none; border-radius:6px;
      background:var(--line); color:var(--ink-soft);
      font-size:.73rem; font-weight:600;
      display:flex; align-items:center; justify-content:center;
      transition:transform .1s;
    }
    .cal-cell.empty { background:transparent; pointer-events:none; }
    .cal-cell:not(:disabled):not(.empty):hover { transform:scale(1.1); }
    .cal-cell.not-due { background:transparent; opacity:.3; pointer-events:none; }
    .cal-cell.future  { background:transparent; opacity:.2; pointer-events:none; }
    .cal-cell.missed  { background:var(--ember-soft); color:var(--ember); opacity:.75; }
    .cal-cell.done    { background:var(--card-color,var(--ember)); color:#fff; }
    .cal-cell.frozen  { background:var(--ice); color:#fff; }
    .cal-cell.today   { box-shadow:0 0 0 2px var(--ink) inset; }
    .cal-legend {
      display:flex; flex-wrap:wrap; gap:.75rem; align-items:center;
      margin-top:.9rem; padding-top:.9rem; border-top:1px solid var(--line);
      font-size:.73rem; color:var(--ink-soft);
    }
    .leg-dot { display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:.3rem; vertical-align:middle; }
    .leg-hint { margin-left:auto; font-style:italic; opacity:.8; }

    /* ── Insights ── */
    .ins-title { font-size:2rem; margin-bottom:.25rem; }
    .ins-sub { color:var(--ink-soft); margin-bottom:1.8rem; font-size:.92rem; }
    .ins-section {
      background:var(--paper-raised); border:1px solid var(--line);
      border-radius:var(--r-lg); padding:1.3rem 1.5rem;
      margin-bottom:1.3rem; box-shadow:var(--shadow-sm);
    }
    .ins-section h2 { font-size:1rem; margin-bottom:1rem; }
    .ins-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.3rem; }

    /* Week bar chart */
    .week-chart { display:flex; justify-content:space-between; gap:.5rem; height:150px; align-items:flex-end; }
    .wc-col { display:flex; flex-direction:column; align-items:center; gap:.3rem; flex:1; height:100%; justify-content:flex-end; }
    .wc-track {
      width:100%; max-width:34px; height:90px;
      background:var(--paper); border:1px solid var(--line);
      border-radius:6px; display:flex; align-items:flex-end; overflow:hidden;
    }
    .wc-bar { width:100%; background:var(--ember); border-radius:5px 5px 0 0; transition:height .3s ease; min-height:2px; }
    .wc-pct { font-size:.7rem; font-weight:700; color:var(--ink); }
    .wc-day { font-size:.67rem; color:var(--ink-soft); text-transform:uppercase; }

    /* Rank list */
    .rank-list { list-style:none; display:flex; flex-direction:column; gap:.35rem; }
    .rank-item {
      display:flex; align-items:center; gap:.55rem; padding:.45rem .55rem;
      border-radius:var(--r-sm); cursor:pointer; transition:background .15s;
    }
    .rank-item:hover { background:var(--ember-bg); }
    .rank-pos { font-size:.75rem; font-weight:700; color:var(--ink-soft); width:22px; }
    .rank-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .rank-name { flex:1; font-size:.87rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rank-streak { font-size:.8rem; font-weight:700; color:var(--ember); white-space:nowrap; }

    /* Category list */
    .cat-list { list-style:none; display:flex; flex-direction:column; gap:.4rem; }
    .cat-item {
      display:flex; justify-content:space-between; padding:.45rem .55rem;
      font-size:.88rem; border-bottom:1px solid var(--line);
    }
    .cat-item:last-child { border-bottom:none; }
    .cat-count { font-weight:700; color:var(--ink-soft); }

    /* Freeze summary */
    .freeze-sum { display:flex; gap:2.5rem; }
    .fz-val { font-family:var(--font-display); font-size:1.75rem; font-weight:700; color:var(--ice); }
    .fz-lbl { font-size:.72rem; color:var(--ink-soft); text-transform:uppercase; }

    /* Completion bars */
    .comp-list { list-style:none; display:flex; flex-direction:column; gap:.65rem; }
    .comp-item { display:grid; grid-template-columns:120px 1fr 42px; align-items:center; gap:.75rem; }
    .comp-name { font-size:.82rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .comp-track { height:8px; background:var(--line); border-radius:5px; overflow:hidden; }
    .comp-bar { height:100%; border-radius:5px; transition:width .3s; }
    .comp-pct { font-size:.78rem; font-weight:700; text-align:right; color:var(--ink-soft); }

    .ins-empty { text-align:center; padding:5rem 1rem; }
    .ins-empty h2 { margin-bottom:.45rem; }
    .ins-empty p { color:var(--ink-soft); margin-bottom:1.2rem; }

    /* ── Responsive ── */
    @media (max-width:720px) { .ins-grid { grid-template-columns:1fr; } }
    @media (max-width:560px) {
      .navbar-inner { gap:.85rem; padding:.85rem 1rem; }
      .main { padding:1.25rem 1rem 3rem; }
      .dash-header h1 { font-size:1.65rem; }
      .summary-bar { gap:1.2rem; }
      .comp-item { grid-template-columns:80px 1fr 38px; gap:.5rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';
const { useState, useEffect, useCallback, useMemo, useContext, createContext } = React;

/* ════════════════════════════════════════════════
   DATE UTILITIES  (all hand-rolled, no library)
   Dates always stored as "YYYY-MM-DD" strings in
   LOCAL time to avoid timezone/midnight drift bugs.
════════════════════════════════════════════════ */
function toDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function todayKey() { return toDateKey(new Date()); }
function fromDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(key, n) {
  const dt = fromDateKey(key);
  dt.setDate(dt.getDate() + n);
  return toDateKey(dt);
}
function diffDays(keyA, keyB) {
  const a = fromDateKey(keyA), b = fromDateKey(keyB);
  const utcA = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const utcB = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((utcA - utcB) / 86400000);
}
function dayOfWeek(key) { return fromDateKey(key).getDay(); }
function lastNDays(n, end = todayKey()) {
  const days = [];
  for (let i = n - 1; i >= 0; i--) days.push(addDays(end, -i));
  return days;
}
function monthGrid(year, month) {
  const cells = [];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(toDateKey(new Date(year, month, d)));
  return cells;
}
function monthName(year, month) {
  return new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function formatWeekday(key) {
  return fromDateKey(key).toLocaleDateString('en-US', { weekday: 'short' });
}

/* ════════════════════════════════════════════════
   STREAK UTILITIES  (hand-rolled, from scratch)
════════════════════════════════════════════════ */
function isDueOnDate(habit, dateKey) {
  if (habit.frequency === 'daily') return true;
  return habit.customDays.includes(dayOfWeek(dateKey));
}
function isCovered(habit, dateKey) {
  return Boolean(habit.checkIns[dateKey]) || Boolean(habit.freezesUsed?.[dateKey]);
}
function calcCurrentStreak(habit) {
  const today = todayKey();
  let cursor = today;
  let streak = 0;
  // Don't penalise the user if they haven't checked in today yet
  if (isDueOnDate(habit, today) && !isCovered(habit, today)) {
    cursor = addDays(today, -1);
  }
  for (let i = 0; i < 365 * 5; i++) {
    if (isDueOnDate(habit, cursor)) {
      if (isCovered(habit, cursor)) { streak++; cursor = addDays(cursor, -1); }
      else break;
    } else {
      cursor = addDays(cursor, -1);
    }
  }
  return streak;
}
function calcLongestStreak(habit) {
  const allDates = Object.keys(habit.checkIns).concat(Object.keys(habit.freezesUsed || {}));
  if (!allDates.length) return 0;
  const sorted = [...new Set(allDates)].sort();
  const earliest = sorted[0];
  const latest = todayKey();
  let longest = 0, running = 0, cursor = earliest;
  const total = diffDays(latest, earliest) + 1;
  for (let i = 0; i < total; i++) {
    if (isDueOnDate(habit, cursor)) {
      if (isCovered(habit, cursor)) { running++; longest = Math.max(longest, running); }
      else running = 0;
    }
    cursor = addDays(cursor, 1);
  }
  return longest;
}
function totalCheckIns(habit) {
  return Object.values(habit.checkIns).filter(Boolean).length;
}
function completionRate(habit, days = 30) {
  const today = todayKey();
  let due = 0, covered = 0;
  for (let i = 0; i < days; i++) {
    const key = addDays(today, -i);
    if (isDueOnDate(habit, key)) { due++; if (isCovered(habit, key)) covered++; }
  }
  return due === 0 ? null : Math.round((covered / due) * 100);
}

/* ════════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════════ */
const STORAGE_KEY = 'habit-tracker-v1';
function loadHabits() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveHabits(habits) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(habits)); } catch {}
}
function genId() { return `h_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`; }

/* ════════════════════════════════════════════════
   CONTEXT
════════════════════════════════════════════════ */
const HabitCtx = createContext(null);
function HabitProvider({ children }) {
  const [habits, setHabits] = useState(() => loadHabits());
  useEffect(() => saveHabits(habits), [habits]);

  const addHabit = useCallback(({ name, category, color, frequency, customDays }) => {
    setHabits(prev => [...prev, {
      id: genId(), name: name.trim(), category, color,
      frequency, customDays: frequency === 'custom' ? customDays : [],
      freezeTokens: 3, freezesUsed: {}, checkIns: {}, createdAt: todayKey(),
    }]);
  }, []);

  const deleteHabit = useCallback(id => setHabits(prev => prev.filter(h => h.id !== id)), []);

  const toggleCheckIn = useCallback((id, dateKey = todayKey()) => {
    setHabits(prev => prev.map(h => {
      if (h.id !== id) return h;
      const checkIns = { ...h.checkIns };
      if (checkIns[dateKey]) delete checkIns[dateKey]; else checkIns[dateKey] = true;
      return { ...h, checkIns };
    }));
  }, []);

  const useFreezeToken = useCallback((id, dateKey = todayKey()) => {
    setHabits(prev => prev.map(h => {
      if (h.id !== id || h.freezeTokens <= 0) return h;
      if (h.checkIns[dateKey] || h.freezesUsed?.[dateKey]) return h;
      if (!isDueOnDate(h, dateKey)) return h;
      return { ...h, freezeTokens: h.freezeTokens - 1, freezesUsed: { ...h.freezesUsed, [dateKey]: true } };
    }));
  }, []);

  const undoFreezeToken = useCallback((id, dateKey) => {
    setHabits(prev => prev.map(h => {
      if (h.id !== id || !h.freezesUsed?.[dateKey]) return h;
      const freezesUsed = { ...h.freezesUsed };
      delete freezesUsed[dateKey];
      return { ...h, freezesUsed, freezeTokens: h.freezeTokens + 1 };
    }));
  }, []);

  const getHabit = useCallback(id => habits.find(h => h.id === id), [habits]);

  return React.createElement(HabitCtx.Provider,
    { value: { habits, addHabit, deleteHabit, toggleCheckIn, useFreezeToken, undoFreezeToken, getHabit } },
    children
  );
}
function useHabits() { return useContext(HabitCtx); }

/* ════════════════════════════════════════════════
   MINI HEATMAP  (last 10 weeks on dashboard cards)
════════════════════════════════════════════════ */
function MiniHeatmap({ habit }) {
  const days = lastNDays(70);
  const weeks = [];
  for (let i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i + 7));
  const state = key => {
    if (habit.checkIns[key]) return 'done';
    if (habit.freezesUsed?.[key]) return 'frozen';
    if (isDueOnDate(habit, key)) return 'missed';
    return 'skip';
  };
  return React.createElement('div', { className: 'mini-heatmap' },
    weeks.map((week, wi) =>
      React.createElement('div', { className: 'hm-col', key: wi },
        week.map(k =>
          React.createElement('div', {
            key: k, title: k,
            className: `hm-cell hm-${state(k)}`,
          })
        )
      )
    )
  );
}

/* ════════════════════════════════════════════════
   CALENDAR HEATMAP  (full month view, detail page)
   CSS Grid built from scratch, no library.
════════════════════════════════════════════════ */
function CalendarHeatmap({ habit }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const { toggleCheckIn, useFreezeToken, undoFreezeToken } = useHabits();
  const today = todayKey();

  const cells = monthGrid(year, month);
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  function goPrev() { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); }
  function goNext() { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); }

  function cellState(k) {
    if (!k) return 'empty';
    if (habit.checkIns[k]) return 'done';
    if (habit.freezesUsed?.[k]) return 'frozen';
    if (k > today) return 'future';
    if (isDueOnDate(habit, k)) return 'missed';
    return 'not-due';
  }

  function onClick(k) {
    if (!k || k > today || !isDueOnDate(habit, k)) return;
    if (habit.freezesUsed?.[k]) { undoFreezeToken(habit.id, k); return; }
    toggleCheckIn(habit.id, k);
  }
  function onRightClick(e, k) {
    e.preventDefault();
    if (!k || k > today || !isDueOnDate(habit, k) || habit.checkIns[k]) return;
    if (habit.freezesUsed?.[k]) undoFreezeToken(habit.id, k);
    else useFreezeToken(habit.id, k);
  }

  const h = React.createElement;
  return h('div', { className: 'cal-wrap', style: { '--card-color': habit.color } },
    h('div', { className: 'cal-head' },
      h('button', { className: 'cal-nav', onClick: goPrev }, '‹'),
      h('h3', null, monthName(year, month)),
      h('button', { className: 'cal-nav', onClick: goNext, disabled: isCurrentMonth }, '›'),
    ),
    h('div', { className: 'cal-weekdays' },
      ['S','M','T','W','T','F','S'].map((d, i) => h('span', { key: i }, d))
    ),
    h('div', { className: 'cal-grid' },
      cells.map((k, i) => {
        const state = cellState(k);
        return h('button', {
          key: i,
          className: `cal-cell ${state}${k === today ? ' today' : ''}`,
          disabled: !k || state === 'future' || state === 'not-due' || state === 'empty',
          onClick: () => onClick(k),
          onContextMenu: e => onRightClick(e, k),
          title: k || '',
        }, k ? parseInt(k.split('-')[2]) : '');
      })
    ),
    h('div', { className: 'cal-legend' },
      h('span', null, h('i', { className: 'leg-dot', style: { background: habit.color } }), 'Checked in'),
      h('span', null, h('i', { className: 'leg-dot', style: { background: '#5b9bd5' } }), 'Frozen'),
      h('span', null, h('i', { className: 'leg-dot', style: { background: 'var(--ember-soft)' } }), 'Missed'),
      h('span', { className: 'leg-hint' }, 'Click to check in · right-click to freeze'),
    ),
  );
}

/* ════════════════════════════════════════════════
   INSIGHTS  PAGE
════════════════════════════════════════════════ */
function Insights({ onNavigate }) {
  const { habits } = useHabits();
  const weekDays = useMemo(() => lastNDays(7), []);

  const weekData = useMemo(() => weekDays.map(k => {
    let due = 0, done = 0;
    habits.forEach(h => {
      if (isDueOnDate(h, k)) { due++; if (isCovered(h, k)) done++; }
    });
    return { k, due, done, pct: due === 0 ? 0 : Math.round((done / due) * 100) };
  }), [habits, weekDays]);

  const byStreak = useMemo(() =>
    [...habits].map(h => ({ h, s: calcCurrentStreak(h) })).sort((a, b) => b.s - a.s)
  , [habits]);

  const byCategory = useMemo(() => {
    const map = {};
    habits.forEach(h => { map[h.category] = (map[h.category] || 0) + 1; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [habits]);

  const tokensLeft = habits.reduce((s, h) => s + h.freezeTokens, 0);
  const tokensSaved = habits.reduce((s, h) => s + Object.keys(h.freezesUsed || {}).length, 0);

  const el = React.createElement;

  if (!habits.length) return el('div', { className: 'page ins-empty' },
    el('h2', null, 'No data yet'),
    el('p', null, 'Add a habit and start checking in to see your insights here.'),
    el('button', { className: 'btn-primary', onClick: () => onNavigate('dashboard') }, '← Back'),
  );

  return el('div', { className: 'page' },
    el('h1', { className: 'ins-title' }, 'Insights'),
    el('p', { className: 'ins-sub' }, 'How consistent you\'ve been, across everything you track.'),

    // Week bar chart
    el('div', { className: 'ins-section' },
      el('h2', null, 'Last 7 days'),
      el('div', { className: 'week-chart' },
        weekData.map(d => el('div', { className: 'wc-col', key: d.k },
          el('div', { className: 'wc-track' },
            el('div', { className: 'wc-bar', style: { height: `${d.pct}%` }, title: `${d.done}/${d.due}` })
          ),
          el('span', { className: 'wc-pct' }, d.due === 0 ? '–' : `${d.pct}%`),
          el('span', { className: 'wc-day' }, formatWeekday(d.k)),
        ))
      ),
    ),

    el('div', { className: 'ins-grid' },
      // Streak leaderboard
      el('div', { className: 'ins-section' },
        el('h2', null, 'Streak leaderboard'),
        el('ul', { className: 'rank-list' },
          byStreak.map(({ h, s }, i) => el('li', { key: h.id },
            el('div', { className: 'rank-item', onClick: () => onNavigate('detail', h.id) },
              el('span', { className: 'rank-pos' }, `#${i + 1}`),
              el('span', { className: 'rank-dot', style: { background: h.color } }),
              el('span', { className: 'rank-name' }, h.name),
              el('span', { className: 'rank-streak' }, `${s} day${s !== 1 ? 's' : ''}`),
            )
          ))
        ),
      ),
      // Category breakdown
      el('div', { className: 'ins-section' },
        el('h2', null, 'By category'),
        el('ul', { className: 'cat-list' },
          byCategory.map(([cat, count]) => el('li', { key: cat, className: 'cat-item' },
            el('span', null, cat), el('span', { className: 'cat-count' }, count)
          ))
        ),
      ),
    ),

    // Freeze tokens
    el('div', { className: 'ins-section' },
      el('h2', null, 'Freeze tokens'),
      el('div', { className: 'freeze-sum' },
        el('div', null,
          el('div', { className: 'fz-val' }, tokensLeft),
          el('div', { className: 'fz-lbl' }, 'tokens remaining'),
        ),
        el('div', null,
          el('div', { className: 'fz-val' }, tokensSaved),
          el('div', { className: 'fz-lbl' }, 'streaks saved'),
        ),
      ),
    ),

    // 30-day completion bars
    el('div', { className: 'ins-section' },
      el('h2', null, '30-day completion'),
      el('ul', { className: 'comp-list' },
        habits.map(h => {
          const r = completionRate(h, 30);
          return el('li', { key: h.id, className: 'comp-item' },
            el('span', { className: 'comp-name' }, h.name),
            el('div', { className: 'comp-track' },
              el('div', { className: 'comp-bar', style: { width: `${r ?? 0}%`, background: h.color } })
            ),
            el('span', { className: 'comp-pct' }, r === null ? '—' : `${r}%`),
          );
        })
      ),
    ),
  );
}

/* ════════════════════════════════════════════════
   ROOT APP  (manual routing — no Router library
   needed in a single file; state-based navigation)
════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('dashboard');  // 'dashboard' | 'detail' | 'insights'
  const [habitId, setHabitId] = useState(null);
  const [theme, setTheme] = useState(() => {
    const saved = localStorage.getItem('habit-tracker-theme');
    return saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('habit-tracker-theme', theme);
  }, [theme]);

  function navigate(p, id = null) { setPage(p); setHabitId(id); }

  const el = React.createElement;
  return el('div', { id: 'app' },
    // Navbar
    el('header', { className: 'navbar' },
      el('div', { className: 'navbar-inner' },
        el('button', { className: 'navbar-brand', onClick: () => navigate('dashboard') },
          el('span', { className: 'brand-mark' }, '＋'), 'Streak'
        ),
        el('nav', { className: 'nav-links' },
          el('button', {
            className: 'nav-btn' + (page === 'dashboard' || page === 'detail' ? ' active' : ''),
            onClick: () => navigate('dashboard'),
          }, 'Dashboard'),
          el('button', {
            className: 'nav-btn' + (page === 'insights' ? ' active' : ''),
            onClick: () => navigate('insights'),
          }, 'Insights'),
        ),
        el('button', {
          className: 'theme-btn',
          onClick: () => setTheme(t => t === 'dark' ? 'light' : 'dark'),
          title: 'Toggle dark mode',
        }, theme === 'dark' ? '☀' : '☾'),
      ),
    ),
    // Page content
    el('div', { className: 'main' },
      page === 'dashboard' && el(Dashboard, { onNavigate: navigate }),
      page === 'detail'    && el(HabitDetail, { habitId, onNavigate: navigate }),
      page === 'insights'  && el(Insights, { onNavigate: navigate }),
    ),
  );
}

/* ════════════════════════════════════════════════
   MOUNT
════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('app')).render(
  React.createElement(HabitProvider, null,
    React.createElement(App, null)
  )
);
</script>
</body>
</html>
