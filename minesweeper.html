<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minesweeper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Dark mode via hidden checkbox + :has ── */
    #dark-toggle { display: none; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #e8f0e8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      transition: background 0.3s, color 0.3s;
    }

    body:has(#dark-toggle:checked) {
      background: #1a1f1a;
      color: #ddeedd;
    }

    /* ── Header ── */
    .top-bar {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #2d6a2d;
    }

    body:has(#dark-toggle:checked) h1 { color: #7bc97b; }

    .dark-label {
      cursor: pointer;
      background: #2d6a2d;
      color: #fff;
      border: none;
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.82rem;
      user-select: none;
      transition: background 0.2s;
    }

    .dark-label:hover { background: #1f4d1f; }
    body:has(#dark-toggle:checked) .dark-label { background: #4a9a4a; }

    /* ── Difficulty selector ── */
    .controls {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .diff-btn {
      padding: 0.4rem 1rem;
      border-radius: 8px;
      border: 2px solid #2d6a2d;
      background: transparent;
      color: #2d6a2d;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s, color 0.2s;
    }

    .diff-btn:hover, .diff-btn.active {
      background: #2d6a2d;
      color: #fff;
    }

    body:has(#dark-toggle:checked) .diff-btn {
      border-color: #7bc97b;
      color: #7bc97b;
    }

    body:has(#dark-toggle:checked) .diff-btn:hover,
    body:has(#dark-toggle:checked) .diff-btn.active {
      background: #7bc97b;
      color: #1a1f1a;
    }

    /* Custom difficulty inputs */
    .custom-inputs {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .custom-inputs input {
      width: 52px;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      border: 2px solid #aaa;
      font-size: 0.82rem;
      text-align: center;
      background: #fff;
      color: #1a1a1a;
    }

    body:has(#dark-toggle:checked) .custom-inputs input {
      background: #2a2f2a;
      color: #ddeedd;
      border-color: #555;
    }

    .custom-inputs label { font-size: 0.78rem; color: #555; }
    body:has(#dark-toggle:checked) .custom-inputs label { color: #aaa; }

    /* ── Stats bar ── */
    .stats {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-size: 0.95rem;
      font-weight: 600;
    }

    body:has(#dark-toggle:checked) .stats {
      background: #252b25;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .stat-item { display: flex; align-items: center; gap: 0.4rem; }
    .stat-icon { font-size: 1.1rem; }

    .reset-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform 0.15s;
      line-height: 1;
    }

    .reset-btn:hover { transform: rotate(20deg) scale(1.2); }

    /* ── Message banner ── */
    .message {
      width: 100%;
      max-width: 680px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.5rem;
      border-radius: 8px;
      margin-bottom: 0.8rem;
      min-height: 2rem;
    }

    .message.win  { background: #c8f0c8; color: #1a5a1a; }
    .message.lose { background: #f5c8c8; color: #7a1a1a; }
    body:has(#dark-toggle:checked) .message.win  { background: #1a3a1a; color: #7bc97b; }
    body:has(#dark-toggle:checked) .message.lose { background: #3a1a1a; color: #e07070; }

    /* ── Board wrapper (scroll on tiny screens) ── */
    .board-wrapper {
      overflow: auto;
      max-width: 100%;
    }

    /* ── Board grid ── */
    #board {
      display: inline-grid;
      gap: 2px;
      background: #b0c8b0;
      padding: 4px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    body:has(#dark-toggle:checked) #board {
      background: #3a4a3a;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    /* ── Individual cell ── */
    .cell {
      width: 34px;
      height: 34px;
      background: #d4e8d4;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, transform 0.1s;
      border: 1px solid #b0c8b0;
    }

    .cell:hover { background: #c0dcc0; transform: scale(1.05); }

    body:has(#dark-toggle:checked) .cell {
      background: #2a3a2a;
      border-color: #3a4a3a;
      color: #ddeedd;
    }

    body:has(#dark-toggle:checked) .cell:hover { background: #354535; }

    /* Revealed cell */
    .cell.revealed {
      background: #f0f7f0;
      cursor: default;
      transform: none;
    }

    body:has(#dark-toggle:checked) .cell.revealed { background: #1e281e; }

    /* Flagged cell */
    .cell.flagged { background: #fff3cd; }
    body:has(#dark-toggle:checked) .cell.flagged { background: #3a3010; }

    /* Mine cell (on loss) */
    .cell.mine { background: #f5c8c8; }
    body:has(#dark-toggle:checked) .cell.mine { background: #4a1a1a; }

    /* Mine that was correctly flagged */
    .cell.mine-found { background: #c8f0c8; }

    /* Number colors — classic minesweeper palette */
    .n1 { color: #1565c0; }
    .n2 { color: #2e7d32; }
    .n3 { color: #c62828; }
    .n4 { color: #4a148c; }
    .n5 { color: #bf360c; }
    .n6 { color: #00695c; }
    .n7 { color: #212121; }
    .n8 { color: #616161; }

    /* ── Leaderboard ── */
    .leaderboard {
      width: 100%;
      max-width: 680px;
      margin-top: 1.5rem;
      background: #fff;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body:has(#dark-toggle:checked) .leaderboard {
      background: #252b25;
    }

    .leaderboard h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      color: #2d6a2d;
    }

    body:has(#dark-toggle:checked) .leaderboard h2 { color: #7bc97b; }

    .lb-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.7rem;
    }

    .lb-tab {
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      border: 1px solid #aaa;
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      color: inherit;
    }

    .lb-tab.active, .lb-tab:hover {
      background: #2d6a2d;
      color: #fff;
      border-color: #2d6a2d;
    }

    body:has(#dark-toggle:checked) .lb-tab.active,
    body:has(#dark-toggle:checked) .lb-tab:hover {
      background: #4a9a4a;
      border-color: #4a9a4a;
    }

    .lb-list { list-style: none; font-size: 0.85rem; }

    .lb-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid #eee;
    }

    body:has(#dark-toggle:checked) .lb-list li { border-color: #333; }

    .lb-list li:last-child { border-bottom: none; }
    .lb-empty { color: #999; font-size: 0.85rem; font-style: italic; }

    .clear-lb {
      margin-top: 0.5rem;
      background: none;
      border: 1px solid #c00;
      color: #c00;
      border-radius: 6px;
      padding: 0.25rem 0.7rem;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .clear-lb:hover { background: #c00; color: #fff; }
  </style>
</head>
<body>

  <!-- Dark mode toggle (hidden checkbox) -->
  <input type="checkbox" id="dark-toggle" />

  <!-- Top bar -->
  <div class="top-bar">
    <h1>💣 Minesweeper</h1>
    <label for="dark-toggle" class="dark-label">🌙 Dark Mode</label>
  </div>

  <!-- Difficulty buttons -->
  <div class="controls">
    <button class="diff-btn active" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff-btn" onclick="setDifficulty('medium')">Medium</button>
    <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
    <div class="custom-inputs">
      <label>R <input type="number" id="cRows" value="10" min="5" max="24"/></label>
      <label>C <input type="number" id="cCols" value="10" min="5" max="30"/></label>
      <label>💣 <input type="number" id="cMines" value="15" min="1" max="200"/></label>
      <button class="diff-btn" onclick="setDifficulty('custom')">Go</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats">
    <div class="stat-item">
      <span class="stat-icon">💣</span>
      <span id="mine-count">0</span>
    </div>
    <button class="reset-btn" id="reset-btn" title="New game">😊</button>
    <div class="stat-item">
      <span class="stat-icon">⏱</span>
      <span id="timer">0</span>s
    </div>
  </div>

  <!-- Win/loss message -->
  <div class="message" id="message"></div>

  <!-- Game board -->
  <div class="board-wrapper">
    <div id="board"></div>
  </div>

  <!-- Leaderboard -->
  <div class="leaderboard">
    <h2>🏆 Leaderboard (Best Times)</h2>
    <div class="lb-tabs" id="lb-tabs"></div>
    <ul class="lb-list" id="lb-list"></ul>
    <button class="clear-lb" onclick="clearLeaderboard()">Clear scores</button>
  </div>

  <script>
    // ─────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────
    let ROWS, COLS, MINES;
    let board = [];        // 2D array of cell objects
    let gameOver = false;
    let firstClick = true;
    let timerInterval = null;
    let seconds = 0;
    let currentDifficulty = 'easy';
    let flagCount = 0;

    // Difficulty presets
    const PRESETS = {
      easy:   { rows: 9,  cols: 9,  mines: 10 },
      medium: { rows: 16, cols: 16, mines: 40 },
      hard:   { rows: 16, cols: 30, mines: 99 }
    };

    // ─────────────────────────────────────────
    //  DIFFICULTY
    // ─────────────────────────────────────────
    function setDifficulty(diff) {
      // Highlight active button
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      if (diff === 'custom') {
        ROWS  = Math.min(24, Math.max(5,  parseInt(document.getElementById('cRows').value)  || 10));
        COLS  = Math.min(30, Math.max(5,  parseInt(document.getElementById('cCols').value)  || 10));
        MINES = Math.min(ROWS * COLS - 9, Math.max(1, parseInt(document.getElementById('cMines').value) || 15));
        currentDifficulty = 'custom';
      } else {
        const p = PRESETS[diff];
        ROWS  = p.rows;
        COLS  = p.cols;
        MINES = p.mines;
        currentDifficulty = diff;
      }

      newGame();
      renderLeaderboard();
    }

    // ─────────────────────────────────────────
    //  NEW GAME
    // ─────────────────────────────────────────
    function newGame() {
      clearInterval(timerInterval);
      seconds = 0;
      flagCount = 0;
      gameOver = false;
      firstClick = true;

      document.getElementById('timer').textContent = '0';
      document.getElementById('mine-count').textContent = MINES;
      document.getElementById('reset-btn').textContent = '😊';
      document.getElementById('message').textContent = '';
      document.getElementById('message').className = 'message';

      // Build blank board
      board = [];
      for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
          board[r][c] = {
            mine: false,
            revealed: false,
            flagged: false,
            adjacent: 0
          };
        }
      }

      renderBoard();
    }

    // ─────────────────────────────────────────
    //  PLACE MINES  (after first click, to keep first click safe)
    // ─────────────────────────────────────────
    function placeMines(safeRow, safeCol) {
      // Cells the first click and its neighbours occupy — kept mine-free
      const safe = new Set();
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = safeRow + dr, nc = safeCol + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS)
            safe.add(nr * COLS + nc);
        }

      let placed = 0;
      while (placed < MINES) {
        const idx = Math.floor(Math.random() * ROWS * COLS);
        const r = Math.floor(idx / COLS), c = idx % COLS;
        if (!board[r][c].mine && !safe.has(idx)) {
          board[r][c].mine = true;
          placed++;
        }
      }

      // Calculate adjacent mine counts
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (!board[r][c].mine)
            board[r][c].adjacent = countAdjacentMines(r, c);
    }

    function countAdjacentMines(r, c) {
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].mine)
            count++;
        }
      return count;
    }

    // ─────────────────────────────────────────
    //  RENDER BOARD
    // ─────────────────────────────────────────
    function renderBoard() {
      const boardEl = document.getElementById('board');
      boardEl.style.gridTemplateColumns = `repeat(${COLS}, 34px)`;
      boardEl.innerHTML = '';

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;

          // Left click → reveal
          cell.addEventListener('click', onCellClick);
          // Right click → flag
          cell.addEventListener('contextmenu', onCellRightClick);

          boardEl.appendChild(cell);
        }
      }

      syncCellVisuals();
    }

    // ─────────────────────────────────────────
    //  SYNC VISUALS  (update DOM to match board state)
    // ─────────────────────────────────────────
    function syncCellVisuals() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach(cellEl => {
        const r = parseInt(cellEl.dataset.r);
        const c = parseInt(cellEl.dataset.c);
        const cell = board[r][c];

        cellEl.className = 'cell';
        cellEl.textContent = '';

        if (cell.revealed) {
          cellEl.classList.add('revealed');
          if (cell.mine) {
            cellEl.classList.add('mine');
            cellEl.textContent = '💥';
          } else if (cell.adjacent > 0) {
            cellEl.textContent = cell.adjacent;
            cellEl.classList.add('n' + cell.adjacent);
          }
        } else if (cell.flagged) {
          cellEl.classList.add('flagged');
          cellEl.textContent = '🚩';
        }
      });
    }

    // ─────────────────────────────────────────
    //  CLICK HANDLERS
    // ─────────────────────────────────────────
    function onCellClick(e) {
      if (gameOver) return;
      const r = parseInt(e.target.dataset.r);
      const c = parseInt(e.target.dataset.c);
      const cell = board[r][c];

      if (cell.flagged || cell.revealed) return;

      // First click: place mines now, then start timer
      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        startTimer();
      }

      if (cell.mine) {
        // Hit a mine → lose
        cell.revealed = true;
        revealAllMines();
        endGame(false);
      } else {
        // Flood-fill reveal
        floodReveal(r, c);
        checkWin();
      }

      syncCellVisuals();
    }

    function onCellRightClick(e) {
      e.preventDefault();
      if (gameOver) return;
      const r = parseInt(e.target.dataset.r);
      const c = parseInt(e.target.dataset.c);
      const cell = board[r][c];

      if (cell.revealed) return;

      cell.flagged = !cell.flagged;
      flagCount += cell.flagged ? 1 : -1;
      document.getElementById('mine-count').textContent = MINES - flagCount;

      syncCellVisuals();
    }

    // ─────────────────────────────────────────
    //  FLOOD FILL  (reveal connected empty cells)
    // ─────────────────────────────────────────
    function floodReveal(startR, startC) {
      // Use a queue (BFS) so we don't overflow the call stack on large boards
      const queue = [[startR, startC]];

      while (queue.length > 0) {
        const [r, c] = queue.shift();
        const cell = board[r][c];

        if (cell.revealed || cell.flagged || cell.mine) continue;

        cell.revealed = true;

        // If no adjacent mines, add all 8 neighbours to the queue
        if (cell.adjacent === 0) {
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !board[nr][nc].revealed)
                queue.push([nr, nc]);
            }
          }
        }
      }
    }

    // ─────────────────────────────────────────
    //  WIN / LOSE
    // ─────────────────────────────────────────
    function checkWin() {
      // Win = every non-mine cell is revealed
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (!board[r][c].mine && !board[r][c].revealed) return;

      endGame(true);
    }

    function revealAllMines() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          if (board[r][c].mine) board[r][c].revealed = true;
        }
    }

    function endGame(won) {
      gameOver = true;
      clearInterval(timerInterval);

      const msgEl = document.getElementById('message');
      const resetBtn = document.getElementById('reset-btn');

      if (won) {
        msgEl.textContent = `🎉 You won in ${seconds}s!`;
        msgEl.className = 'message win';
        resetBtn.textContent = '😎';
        saveScore(currentDifficulty, seconds);
        renderLeaderboard();
      } else {
        msgEl.textContent = '💥 Boom! You hit a mine.';
        msgEl.className = 'message lose';
        resetBtn.textContent = '😵';
      }
    }

    // ─────────────────────────────────────────
    //  TIMER
    // ─────────────────────────────────────────
    function startTimer() {
      seconds = 0;
      document.getElementById('timer').textContent = '0';
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = seconds;
      }, 1000);
    }

    // ─────────────────────────────────────────
    //  LEADERBOARD  (localStorage)
    // ─────────────────────────────────────────
    let currentLbDiff = 'easy';

    function saveScore(diff, time) {
      if (diff === 'custom') return; // don't save custom games
      const key = 'minesweeper_lb_' + diff;
      let scores = JSON.parse(localStorage.getItem(key) || '[]');
      scores.push(time);
      scores.sort((a, b) => a - b);
      scores = scores.slice(0, 5); // keep top 5
      localStorage.setItem(key, JSON.stringify(scores));
    }

    function renderLeaderboard() {
      // Build tabs
      const tabsEl = document.getElementById('lb-tabs');
      tabsEl.innerHTML = '';
      ['easy', 'medium', 'hard'].forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'lb-tab' + (d === currentLbDiff ? ' active' : '');
        btn.textContent = d.charAt(0).toUpperCase() + d.slice(1);
        btn.onclick = () => { currentLbDiff = d; renderLeaderboard(); };
        tabsEl.appendChild(btn);
      });

      const listEl = document.getElementById('lb-list');
      const key = 'minesweeper_lb_' + currentLbDiff;
      const scores = JSON.parse(localStorage.getItem(key) || '[]');
      listEl.innerHTML = '';

      if (scores.length === 0) {
        listEl.innerHTML = '<li><span class="lb-empty">No scores yet — win a game!</span></li>';
      } else {
        scores.forEach((s, i) => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${['🥇','🥈','🥉','4.','5.'][i]} Rank ${i+1}</span><span>${s}s</span>`;
          listEl.appendChild(li);
        });
      }
    }

    function clearLeaderboard() {
      ['easy','medium','hard'].forEach(d => localStorage.removeItem('minesweeper_lb_' + d));
      renderLeaderboard();
    }

    // ─────────────────────────────────────────
    //  RESET BUTTON
    // ─────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', newGame);

    // ─────────────────────────────────────────
    //  BOOT
    // ─────────────────────────────────────────
    const p = PRESETS['easy'];
    ROWS = p.rows; COLS = p.cols; MINES = p.mines;
    newGame();
    renderLeaderboard();
  </script>
</body>
</html>
